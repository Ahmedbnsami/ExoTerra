<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/upload.css') }}"
    />
    <style>
      .loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: white;
        border-radius: 50%;
        text-align: left;
        display: inline-block;
        margin-left: 8px;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      button.loading {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .response-container {
        background: #2a3245;
        padding: 20px;
        border-radius: 12px;
        margin-top: 10px;
        line-height: 1.6;
        font-size: 15px;
        color: #fff;
        text-align: left;
      }

      .response-container h1,
      .response-container h2,
      .response-container h3 {
        margin-top: 12px;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .response-container strong {
        color: #7ecfff;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo"><a href="{{ url_for('index') }}">ExoTerra</a></div>
      <ul>
        <li><a href="{{ url_for('index') }}">Home</a></li>
        <li><a href="{{ url_for('explore') }}">Explore</a></li>
        <li><a href="{{ url_for('team') }}">Team</a></li>
        <li><a href="{{ url_for('data') }}">Data</a></li>
      </ul>
    </nav>

    <section class="section">
      <h2>Upload Data</h2>
      <form method="post" action="/upload_form" enctype="multipart/form-data">
        <div class="form-grid">
          <div class="form-group">
            <label for="file-upload" class="custom-file"
              >Choose CSV file:</label
            >
            <label for="file-upload" class="custom-file-upload" id="file-label">
              Upload CSV
            </label>
            <input
              id="file-upload"
              type="file"
              name="file"
              accept=".csv"
              required
            />
          </div>

          <div class="form-group">
            <label for="name">Name:</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Optional name"
            />
          </div>

          <div class="form-group">
            <label for="category">Category:</label>
            <input
              type="text"
              id="category"
              name="category"
              placeholder="e.g. Astronomy"
            />
          </div>

          <div class="form-group">
            <label for="description">Description:</label>
            <textarea
              id="description"
              name="description"
              placeholder="Optional description"
            ></textarea>
          </div>
        </div>

        <button type="submit" id="submit-btn">Upload</button>
      </form>
    </section>

    <script>
      const fileInput = document.getElementById("file-upload");
      const fileLabel = document.getElementById("file-label");
      const form = document.querySelector("form");
      const submitBtn = document.getElementById("submit-btn");
      const section = document.querySelector(".section");

      fileInput.addEventListener("change", function () {
        if (this.files && this.files.length > 0) {
          fileLabel.textContent = this.files[0].name;
          fileLabel.classList.add("selected");
        } else {
          fileLabel.textContent = "Upload CSV";
          fileLabel.classList.remove("selected");
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const file = fileInput.files[0];
        const name = document.getElementById("name").value;
        const category = document.getElementById("category").value;
        const description = document.getElementById("description").value;

        if (!file) {
          alert("Please upload a CSV file.");
          return;
        }

        // 🟡 Show loading on button
        submitBtn.classList.add("loading");
        submitBtn.disabled = true;
        const originalText = submitBtn.textContent;
        submitBtn.textContent = "Uploading...";
        const spinner = document.createElement("span");
        spinner.className = "loading-spinner";
        submitBtn.appendChild(spinner);

        try {
          const text = await file.text();
          const lines = text
            .split("\n")
            .map((line) => line.trim())
            .filter((line) => line);
          const headers = lines[0]?.split(",") || [];
          const rowCount = lines.length - 1;
          const sampleRows = lines.slice(1, 4).join("\n");

          const formData = new FormData(form); // includes file + all inputs
          const resource = await fetch("/upload_form", {
            method: "POST",
            body: formData,
          });

          const rresult = await resource.json(); // make sure your Flask route returns JSON
          console.log("Predictions:", rresult);

          const prompt = `
          Please start your response with the following H1 heading: "Your Form Analysis" immediately followed by the first paragraph, without extra blank lines.

          The user has uploaded a CSV file named "${file.name}". This dataset contains ${rowCount} rows and the following columns: ${headers.join(", ")}. 

          The dataset falls under the category "${category || "N/A"}" and is described as "${description || "N/A"}". The user provided the name: "${name || "N/A"}".

          Here are the first few rows of data for reference:
          ${sampleRows}

          Please provide a clear, structured summary of this dataset. Describe its overall structure, potential patterns, relationships, or insights, in readable paragraphs rather than bullet points, and avoid inserting extra blank lines between the heading and text.
          `.trim();

          const response = await fetch("/get_response", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt }),
          });

          if (!response.ok) {
            throw new Error("Failed to upload");
          }

          const result = await response.json();

          // 🧹 Clear the section and display nicely formatted response
          section.innerHTML = "";
          const container = document.createElement("div");
          container.className = "response-container";

          const markdown =
            result.response || result.text || JSON.stringify(result, null, 2);
          let html = markdown
            .replace(/^### (.*$)/gim, "<h3>$1</h3>")
            .replace(/^## (.*$)/gim, "<h2>$1</h2>")
            .replace(/^# (.*$)/gim, "<h1>$1</h1>")
            .replace(/\*\*(.*?)\*\*/gim, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");

          container.innerHTML = html;
          section.appendChild(container);
        } catch (err) {
          console.error(err);
          alert("Error uploading file.");
        } finally {
          submitBtn.classList.remove("loading");
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });


    </script>
  </body>
</html>
